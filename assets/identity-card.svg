@keyframes fR{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.L{opacity:0;animation:fL .6s ease-out .1s forwards}
.R{opacity:0;animation:fR .6s ease-out .5s forwards}
text{font-family:-apple-system,'Segoe UI',Arial,sans-serif}
</style>
<rect width="800" height="108" fill="#0d1117"/>
