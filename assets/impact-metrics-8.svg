  <text x="220" y="65" font-size="28" font-weight="700" fill="#a78bfa">12+</text>
  <text x="220" y="81" font-size="9" fill="#5b21b6">community outreach programs</text>
</g>
<g class="c3">
  <rect x="404" y="28" width="178" height="72" rx="6" fill="#0a1a0d" stroke="#1a3020" stroke-width="1"/>
  <text x="414" y="41" font-size="8" fill="#065f46" letter-spacing="1">FINANCIAL ADVISOR</text>
