<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes cU{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.c1{opacity:0;animation:cU .4s ease-out .1s forwards}
.c2{opacity:0;animation:cU .4s ease-out .2s forwards}
.c3{opacity:0;animation:cU .4s ease-out .3s forwards}
.c4{opacity:0;animation:cU .4s ease-out .4s forwards}
.c5{opacity:0;animation:cU .4s ease-out .5s forwards}
.c6{opacity:0;animation:cU .4s ease-out .6s forwards}
.c7{opacity:0;animation:cU .4s ease-out .7s forwards}
.c8{opacity:0;animation:cU .4s ease-out .8s forwards}
text{font-family:-apple-system,'Segoe UI',Arial,sans-serif}
</style>
<rect width="800" height="200" fill="#0d1117"/>
<text x="400" y="18" text-anchor="middle" font-size="9" fill="#484f58" letter-spacing="4" font-weight="600">BY THE NUMBERS</text>
<g class="c1">
  <rect x="16" y="28" width="178" height="72" rx="6" fill="#0d1f0d" stroke="#1a3a1a" stroke-width="1"/>
