  <text x="26" y="65" font-size="24" font-weight="700" fill="#6bcf3f">8 Years</text>
  <text x="26" y="81" font-size="9" fill="#4d7c0f">U.S. Army National Guard</text>
</g>
<g class="c2">
  <rect x="210" y="28" width="178" height="72" rx="6" fill="#0d0a1a" stroke="#2a1a40" stroke-width="1"/>
