<svg width="800" height="210" viewBox="0 0 800 210" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes drawLine{from{stroke-dashoffset:720}to{stroke-dashoffset:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{opacity:0;r:0}70%{r:10}100%{opacity:1;r:8}}
@keyframes popDot{0%{opacity:0;r:0}100%{opacity:1;r:4}}
@keyframes pulse{0%,100%{r:16;opacity:.15}50%{r:20;opacity:.05}}
text{font-family:-apple-system,'Segoe UI',Arial,sans-serif}
.tl{stroke-dasharray:720;stroke-dashoffset:720;animation:drawLine 3s ease-out .1s forwards}
.g1{opacity:0;animation:fadeUp .5s ease-out .3s forwards}
.g2{opacity:0;animation:fadeDown .5s ease-out .6s forwards}
.g3{opacity:0;animation:fadeUp .5s ease-out .9s forwards}
.g4{opacity:0;animation:fadeDown .5s ease-out 1.2s forwards}
.g5{opacity:0;animation:fadeUp .5s ease-out 1.5s forwards}
.g6{opacity:0;animation:fadeDown .5s ease-out 1.8s forwards}
.g7{opacity:0;animation:fadeUp .5s ease-out 2.1s forwards}
.g8{opacity:0;animation:fadeDown .5s ease-out 2.4s forwards}
.oa{animation:pop .4s cubic-bezier(.34,1.56,.64,1) .35s both;transform-box:fill-box;transform-origin:center}
.ob{animation:pop .4s cubic-bezier(.34,1.56,.64,1) .65s both;transform-box:fill-box;transform-origin:center}
.oc{animation:pop .4s cubic-bezier(.34,1.56,.64,1) .95s both;transform-box:fill-box;transform-origin:center}
.od{animation:pop .4s cubic-bezier(.34,1.56,.64,1) 1.25s both;transform-box:fill-box;transform-origin:center}
.oe{animation:pop .4s cubic-bezier(.34,1.56,.64,1) 1.55s both;transform-box:fill-box;transform-origin:center}
.of{animation:pop .4s cubic-bezier(.34,1.56,.64,1) 1.85s both;transform-box:fill-box;transform-origin:center}
.og{animation:pop .4s cubic-bezier(.34,1.56,.64,1) 2.15s both;transform-box:fill-box;transform-origin:center}
.oh{animation:pop .4s cubic-bezier(.34,1.56,.64,1) 2.45s both;transform-box:fill-box;transform-origin:center}
.da{animation:popDot .3s ease-out .65s both;transform-box:fill-box;transform-origin:center}
.db{animation:popDot .3s ease-out .95s both;transform-box:fill-box;transform-origin:center}
.dc{animation:popDot .3s ease-out 1.25s both;transform-box:fill-box;transform-origin:center}
.dd{animation:popDot .3s ease-out 1.55s both;transform-box:fill-box;transform-origin:center}
.de{animation:popDot .3s ease-out 1.85s both;transform-box:fill-box;transform-origin:center}
.df{animation:popDot .3s ease-out 2.15s both;transform-box:fill-box;transform-origin:center}
.dg{animation:popDot .3s ease-out 2.45s both;transform-box:fill-box;transform-origin:center}
.dh{animation:popDot .3s ease-out 2.75s both;transform-box:fill-box;transform-origin:center}
.ring{animation:pulse 2.5s ease-in-out 3.2s infinite;transform-box:fill-box;transform-origin:center}
</style>
<rect width="800" height="210" fill="#0d1117"/>
<text x="400" y="18" text-anchor="middle" font-size="9" fill="#484f58" letter-spacing="4" font-weight="600">THE CAREER ARC</text>
<line x1="50" y1="105" x2="770" y2="105" stroke="#21262d" stroke-width="2.5"/>
<line x1="50" y1="105" x2="770" y2="105" stroke="#58a6ff" stroke-width="1.5" opacity=".4" class="tl"/>

<!-- Army Guard above x=50 -->
<g class="g1">
  <line x1="50" y1="97" x2="50" y2="82" stroke="#4d7c0f" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="50" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#6bcf3f">Army Guard</text>
  <text x="50" y="63" text-anchor="middle" font-size="9" fill="#4d7c0f">2013–2021</text>
</g>
<circle class="oa" cx="50" cy="105" r="0" fill="#0d1a0d" stroke="#4d7c0f" stroke-width="2"/>
<circle class="da" cx="50" cy="105" r="0" fill="#6bcf3f"/>

<!-- Pastoral Care below x=160 -->
<g class="g2">
  <line x1="160" y1="113" x2="160" y2="128" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="160" y="141" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">Pastoral Care</text>
  <text x="160" y="153" text-anchor="middle" font-size="9" fill="#5b21b6">2015–2018</text>
</g>
<circle class="ob" cx="160" cy="105" r="0" fill="#0d0a1a" stroke="#7c3aed" stroke-width="2"/>
<circle class="db" cx="160" cy="105" r="0" fill="#a78bfa"/>

<!-- Fin. Advisor above x=270 -->
<g class="g3">
  <line x1="270" y1="97" x2="270" y2="82" stroke="#059669" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="270" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">Fin. Advisor</text>
  <text x="270" y="63" text-anchor="middle" font-size="9" fill="#065f46">2018–2019</text>
</g>
<circle class="oc" cx="270" cy="105" r="0" fill="#0a1a0d" stroke="#059669" stroke-width="2"/>
<circle class="dc" cx="270" cy="105" r="0" fill="#34d399"/>

<!-- AT&T below x=380 -->
<g class="g4">
  <line x1="380" y1="113" x2="380" y2="128" stroke="#0284c7" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="380" y="141" text-anchor="middle" font-size="11" font-weight="700" fill="#38bdf8">AT&amp;T Specialist</text>
  <text x="380" y="153" text-anchor="middle" font-size="9" fill="#0369a1">2019–2021</text>
</g>
<circle class="od" cx="380" cy="105" r="0" fill="#0a141a" stroke="#0284c7" stroke-width="2"/>
<circle class="dd" cx="380" cy="105" r="0" fill="#38bdf8"/>

<!-- Software Dev above x=490 -->
<g class="g5">
  <line x1="490" y1="97" x2="490" y2="82" stroke="#4f46e5" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="490" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#818cf8">Software Dev</text>
  <text x="490" y="63" text-anchor="middle" font-size="9" fill="#3730a3">2021–2022</text>
</g>
<circle class="oe" cx="490" cy="105" r="0" fill="#0d0d1f" stroke="#4f46e5" stroke-width="2"/>
<circle class="de" cx="490" cy="105" r="0" fill="#818cf8"/>

<!-- App Developer below x=575 -->
<g class="g6">
  <line x1="575" y1="113" x2="575" y2="128" stroke="#0891b2" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="575" y="141" text-anchor="middle" font-size="11" font-weight="700" fill="#22d3ee">App Developer</text>
  <text x="575" y="153" text-anchor="middle" font-size="9" fill="#0e7490">2022–2024</text>
</g>
<circle class="of" cx="575" cy="105" r="0" fill="#0a1420" stroke="#0891b2" stroke-width="2"/>
<circle class="df" cx="575" cy="105" r="0" fill="#22d3ee"/>

<!-- Robotics Dir above x=665 -->
<g class="g7">
  <line x1="665" y1="97" x2="665" y2="82" stroke="#d97706" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="665" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">Robotics Dir.</text>
  <text x="665" y="63" text-anchor="middle" font-size="9" fill="#92400e">2023–2024</text>
</g>
<circle class="og" cx="665" cy="105" r="0" fill="#1a1200" stroke="#d97706" stroke-width="2"/>
<circle class="dg" cx="665" cy="105" r="0" fill="#fbbf24"/>

<!-- Data Scientist below x=760 CURRENT -->
<g class="g8">
  <line x1="760" y1="113" x2="760" y2="128" stroke="#58a6ff" stroke-width="2" stroke-dasharray="2 2"/>
  <text x="760" y="141" text-anchor="middle" font-size="12" font-weight="700" fill="#58a6ff">Data Scientist</text>
  <text x="760" y="154" text-anchor="middle" font-size="9" fill="#1f6feb">2024 – Now</text>
</g>
<circle class="ring" cx="760" cy="105" r="0" fill="none" stroke="#58a6ff" stroke-width="1"/>
<circle class="oh" cx="760" cy="105" r="0" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>
<circle class="dh" cx="760" cy="105" r="0" fill="#58a6ff"/>

<text x="400" y="197" text-anchor="middle" font-size="9" fill="#2f363d" font-style="italic">"Every role I ever held was training for the one I am doing right now."</text>
</svg>
