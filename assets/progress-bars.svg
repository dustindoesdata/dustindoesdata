<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes fillHackerRank{from{width:0}to{width:534px}}
@keyframes fillHomeschool{from{width:0}to{width:660px}}
@keyframes fillAnthropic{from{width:0}to{width:660px}}
@keyframes fadeRow{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
text{font-family:-apple-system,'Segoe UI',Arial,sans-serif}
.r1{opacity:0;animation:fadeRow .4s ease-out .2s forwards}
.r2{opacity:0;animation:fadeRow .4s ease-out .5s forwards}
.r3{opacity:0;animation:fadeRow .4s ease-out .8s forwards}
.r4{opacity:0;animation:fadeRow .4s ease-out 1.1s forwards}
.b1{width:0;animation:fillHackerRank 1.6s cubic-bezier(.4,0,.2,1) .6s forwards}
.b3{width:0;animation:fillHomeschool 1.4s cubic-bezier(.4,0,.2,1) 1.2s forwards}
.b4{width:0;animation:fillAnthropic 1.4s cubic-bezier(.4,0,.2,1) 1.5s forwards}
</style>
<rect width="800" height="280" fill="#0d1117"/>
<text x="400" y="18" text-anchor="middle" font-size="9" fill="#484f58" letter-spacing="4" font-weight="600">CURRENTLY BUILDING</text>

<!-- Row 1: HackerRank SQL -->
<g class="r1">
  <text x="20" y="40" font-size="12" font-weight="700" fill="#c9d1d9">HackerRank SQL</text>
  <text x="20" y="54" font-size="9" fill="#484f58">Clearing every non-hard challenge before advancing</text>
  <rect x="20" y="60" width="660" height="11" rx="5.5" fill="#21262d"/>
  <rect class="b1" x="20" y="60" height="11" rx="5.5" fill="#fbbf24"/>
  <text x="692" y="70" font-size="10" font-weight="700" fill="#fbbf24">47 / 58</text>
  <text x="762" y="70" font-size="10" fill="#484f58">81%</text>
</g>

<!-- Row 2: LeetCode queued -->
<g class="r2">
  <text x="20" y="95" font-size="12" font-weight="700" fill="#c9d1d9">LeetCode</text>
  <text x="20" y="109" font-size="9" fill="#484f58">Begins when HackerRank mission is complete</text>
  <rect x="20" y="115" width="660" height="11" rx="5.5" fill="#21262d"/>
  <text x="692" y="125" font-size="10" font-weight="600" fill="#484f58">Queued</text>
</g>

<!-- Row 3: Homeschool Project -->
<g class="r3">
  <text x="20" y="150" font-size="12" font-weight="700" fill="#c9d1d9">Homeschool Project</text>
  <text x="20" y="164" font-size="9" fill="#484f58">Phase 1 of 5 complete · scrape → clean → visualize → predict · Phase 2 queued</text>
  <rect x="20" y="170" width="660" height="11" rx="5.5" fill="#21262d"/>
  <rect class="b3" x="20" y="170" height="11" rx="5.5" fill="#34d399"/>
  <text x="692" y="180" font-size="10" font-weight="700" fill="#34d399">Done</text>
  <text x="762" y="180" font-size="10" fill="#484f58">100%</text>
</g>

<!-- Row 4: Anthropic Academy -->
<g class="r4">
  <text x="20" y="205" font-size="12" font-weight="700" fill="#c9d1d9">Anthropic Academy</text>
  <text x="20" y="219" font-size="9" fill="#484f58">16 of 16 courses complete · Anthropic Academy fully certified</text>
  <rect x="20" y="228" width="660" height="11" rx="5.5" fill="#21262d"/>
  <rect class="b4" x="20" y="228" height="11" rx="5.5" fill="#d97757"/>
  <text x="692" y="238" font-size="10" font-weight="700" fill="#d97757">Done</text>
  <text x="762" y="238" font-size="10" fill="#484f58">100%</text>
</g>
</svg>
